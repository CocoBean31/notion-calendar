<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekly Planner</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="planner">

    <h1>This Week</h1>

    <div class="week">

        <div class="day">
            <h2>Mon</h2>
            <p>29</p>
        </div>

        <div class="day">
            <h2>Tue</h2>
            <p>30</p>
        </div>

        <div class="day">
            <h2>Wed</h2>
            <p>1</p>
        </div>

        <div class="day">
            <h2>Thu</h2>
            <p>2</p>
        </div>

        <div class="day">
            <h2>Fri</h2>
            <p>3</p>
        </div>

        <div class="day">
            <h2>Sat</h2>
            <p>4</p>
        </div>

        <div class="day">
            <h2>Sun</h2>
            <p>5</p>
        </div>

    </div>

</div>

</body>

</html>
