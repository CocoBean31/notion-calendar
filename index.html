<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weekly Planner</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="planner">

   <div class="header">

    <div class="week-nav">

    <button id="prevWeek" class="nav-btn">
        ←
    </button>

    <h1 id="week-title"></h1>

    <button id="nextWeek" class="nav-btn">
        →
    </button>

</div>

    <div class="header-buttons">

        <button id="connectBtn" class="connect-btn">
            ✓ Connected
        </button>

        <button id="todayBtn" class="today-btn">
            Today
        </button>

    </div>

</div>

<div class="week">

    <div class="day" data-day="0">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-0"></div>
    </div>

    <div class="day" data-day="1">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-1"></div>
    </div>

    <div class="day" data-day="2">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-2"></div>
    </div>

    <div class="day" data-day="3">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-3"></div>
    </div>

    <div class="day" data-day="4">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-4"></div>
    </div>

    <div class="day" data-day="5">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-5"></div>
    </div>

    <div class="day" data-day="6">
        <div class="day-header">
            <span class="weekday"></span>
            <span class="date"></span>
        </div>
        <div class="events" id="events-6"></div>
    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="script.js"></script>

</body>
</html>

renderWeek();
